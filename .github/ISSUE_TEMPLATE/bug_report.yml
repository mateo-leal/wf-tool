name: Bug report
description: Create a report to help us improve
labels: [ bug ]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue.
        Please provide enough detail for us to reproduce it.

  - type: textarea
    id: summary
    attributes:
      label: Describe the bug
      description: A clear and concise description of what is wrong.
      placeholder: The KIM simulation returns an empty result for a dialogue that
        should have available paths.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us exactly how to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Open ...
        3. Click ...
        4. Observe ...

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: workspace
    attributes:
      label: Workspace
      description: Which part of the monorepo does this affect?
      options:
        - Web (apps/web)
        - Core Library (packages/core)
        - KIM Library (packages/kim)
        - Shared Library (packages/shared)
        - Monorepo / Tooling
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - KIM Pathfinder
        - Checklist
        - Mastery Checklist
        - Widgets / Live Data
        - Localization / Translations
        - Settings / UI
        - API
        - Performance
        - Accessibility
        - Data / Constants
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share your runtime info (OS, browser, app version/commit if known).
      placeholder: |
        - OS: Ubuntu 24.04
        - Browser: Firefox 136

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Include relevant screenshots, console output, or stack traces.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any extra details that might help us debug.
